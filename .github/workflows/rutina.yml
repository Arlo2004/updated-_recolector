name: Actualizador Diario
on:
  schedule:
    - cron: '0 8 * * *' # Se ejecuta todos los días a las 8:00 AM
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: python actualizador.py
      - name: Guardar en GitHub
        run: |
          git config --global user.name 'Robot'
          git config --global user.email 'robot@github.com'
          git add graficos/*.png datos_pronostico.csv
          git commit -m "Actualizacion automatica" || exit 0
          git push
